<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>MemeGen</title>
</head>
<body>
    <div class='face'>
        <div class="plate">
            <h1>Генератор случайного мема</h1>
            <p>Для любой ситуации и в любое время</p>
            <div class="startButton">Генерировать</div>
        </div>
    </div>
    
    <div class="memMenu">
        <div class="text">Выбери тему для генерации: </div>
        <div class="choiceMenu">    
            <div class="choiceButton">Меме</div>
            <div class="choiceButton">чё-нидь ещё</div>
            <div class="choiceButton">Радон</div>
            <div class="choiceButton">kitty</div>
        </div>
        
    </div>
    <div class="result">
        
        <div class="picturePlace">
            <div class="picture">Картинка</div>
        </div>
        <p id="memeText">Некая информация о картинке</p>
        <div class="close">
            <div class="coolBtn">Клёва</div>
            <div class="coolBtn">Мем кака</div>
        </div>
    </div>
</body>
</html>
